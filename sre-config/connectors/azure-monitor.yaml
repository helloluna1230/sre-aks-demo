# Azure Monitor Incident Platform — ARM agent resource configuration
#
# The GA setup enables Azure Monitor by PATCHing the Microsoft.App/agents
# resource with incidentManagementConfiguration.type = AzMonitor. This file is
# retained as documentation for the logical connector used by the lab.
api_version: azuresre.ai/v2
kind: DataConnector
spec:
  name: azure-monitor
  dataConnectorType: AzureMonitor
  dataSource: azure-monitor
