# GitHub MCP Connector — optional MCP transport template
#
# The GA sandbox configuration uses github-oauth.yaml for native GitHub code
# repository and issue tools. Keep this template only for advanced scenarios
# where you explicitly want to connect the GitHub MCP Streamable-HTTP server.
# Reference: PUT {agentEndpoint}/api/v2/extendedAgent/connectors/github-mcp
api_version: azuresre.ai/v2
kind: DataConnector
spec:
  name: github-mcp
  dataConnectorType: StreamableHttp
  dataSource: github
  serverUri: https://api.githubcopilot.com/mcp/
  authenticationType: BearerToken
  # Token is passed at runtime via -GitHubPat parameter
